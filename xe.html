<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USD to CNY Converter with Bonus/Penalty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in { animation: slideIn 0.5s ease-out; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-2.5 pt-5 flex justify-center items-start sm:p-4 sm:items-center">

<div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-xl animate-slide-in border border-gray-200">
  <h2 class="text-gray-800 text-center mb-6 text-2xl font-bold">💱 USD ↔️ CNY Converter</h2>

  <!-- Exchange Rate Settings -->
  <div class="bg-blue-50 p-4 rounded-lg mb-4 border border-blue-200">
    <div class="flex justify-between items-center mb-3">
      <div class="text-gray-700 font-semibold text-sm">Exchange Rate</div>
      <button onclick="fetchRates()" id="fetchBtn" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-md transition-all shadow-sm hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
        🔄 Fetch Real-time
      </button>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">Rate (1 USD =)</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <input id="rate" value="6.83" oninput="calculate()" class="flex-1 px-3 border-2 border-blue-300 text-sm rounded-l-md transition-all focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-200 hover:border-blue-400">
        <span class="flex items-center px-2.5 bg-blue-200 border-2 border-blue-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">CNY</span>
      </div>
    </div>
  </div>

  <!-- Bonus/Penalty Section -->
  <div class="bg-green-50 p-4 rounded-lg mb-4 border border-green-200">
    <div class="text-gray-700 font-semibold text-sm mb-3">Bonus / Penalty</div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">Per 10,000 USD</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <span class="flex items-center px-2.5 bg-green-200 border-2 border-green-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold">$</span>
        <input id="bonus" value="100" oninput="calculate()" class="flex-1 px-3 border-2 border-green-300 text-sm rounded-r-md transition-all focus:outline-none focus:border-green-600 focus:ring-2 focus:ring-green-200 hover:border-green-400">
      </div>
    </div>
  </div>

  <!-- Conversion Section -->
  <div class="bg-purple-50 p-4 rounded-lg mb-4 border border-purple-200">
    <div class="text-gray-700 font-semibold text-sm mb-3">💱 Convert</div>
    <div class="space-y-2.5">
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
        <label class="text-gray-800 font-medium text-sm sm:flex-1">Provided USD</label>
        <div class="flex items-stretch h-9 w-full sm:w-60">
          <span class="flex items-center px-2.5 bg-purple-200 border-2 border-purple-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold">$</span>
          <input id="usd" value="10100" oninput="calculateFromUSD()" class="flex-1 px-3 border-2 border-purple-300 text-sm rounded-r-md transition-all focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200 hover:border-purple-400">
        </div>
      </div>
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
        <label class="text-gray-800 font-medium text-sm sm:flex-1">CNY Amount</label>
        <div class="flex items-stretch h-9 w-full sm:w-60">
          <span class="flex items-center px-2.5 bg-purple-200 border-2 border-purple-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold">¥</span>
          <input id="cny" value="68300" oninput="calculateFromCNY()" class="flex-1 px-3 border-2 border-purple-300 text-sm rounded-r-md transition-all focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200 hover:border-purple-400">
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="result" class="space-y-3">
    <!-- Results will be inserted here -->
  </div>
</div>

<script>
// Fetch real-time exchange rates
async function fetchRates() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Fetching...';
  
  try {
    // Use free exchange rate API
    const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await response.json();
    
    if (data.rates && data.rates.CNY) {
      document.getElementById('rate').value = data.rates.CNY.toFixed(4);
      calculate();
      
      btn.innerHTML = '✅ Updated';
      setTimeout(() => {
        btn.innerHTML = '🔄 Fetch Real-time';
        btn.disabled = false;
      }, 2000);
    }
  } catch (error) {
    console.error('Failed to fetch rates:', error);
    btn.innerHTML = '❌ Failed';
    setTimeout(() => {
      btn.innerHTML = '🔄 Fetch Real-time';
      btn.disabled = false;
    }, 2000);
  }
}

function calculateFromUSD() {
  const rate = Number(document.getElementById("rate").value) || 0;
  const bonusRate = Number(document.getElementById("bonus").value) || 0;
  const pUSD = Number(document.getElementById("usd").value) || 0;

  // Effective rate = rate / (1 + bonusRate/10000)
  const effectiveRate = rate / (1 + bonusRate / 10000);
  
  // Calculate CNY from provided USD
  const cny = pUSD * effectiveRate;
  
  // Back-calculate: cUSD = CNY / rate
  const cUSD = cny / rate;
  
  // bonus = cUSD / 10000 * bonusRate
  const bonus = (cUSD / 10000) * bonusRate;

  document.getElementById("cny").value = cny.toFixed(2);
  displayResult(rate, cUSD, bonus, pUSD, cny);
}

function calculateFromCNY() {
  const rate = Number(document.getElementById("rate").value) || 0;
  const bonusRate = Number(document.getElementById("bonus").value) || 0;
  const cny = Number(document.getElementById("cny").value) || 0;

  // cUSD = CNY / rate
  const cUSD = cny / rate;
  
  // bonus = cUSD / 10000 * bonusRate
  const bonus = (cUSD / 10000) * bonusRate;
  
  // pUSD = cUSD + bonus
  const pUSD = cUSD + bonus;

  document.getElementById("usd").value = pUSD.toFixed(2);
  displayResult(rate, cUSD, bonus, pUSD, cny);
}

function calculate() {
  calculateFromUSD();
}

function displayResult(rate, cUSD, bonus, pUSD, cny) {
  let resultHTML = `
    <div class="mt-4 p-4 bg-gray-800 text-white rounded-lg shadow-lg">
      <div class="text-left space-y-3">
        <div class="flex justify-between items-center text-xl font-bold border-b border-white/30 pb-3">
          <span>🇨🇳 CNY</span>
          <span class="bg-green-600 px-4 py-2 rounded text-2xl">¥${cny.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
        </div>
        
        <div class="bg-white/10 rounded p-3 space-y-1.5">
          <div class="flex justify-between text-xs text-white/70">
            <span>Exchange Rate</span>
            <span>${rate.toFixed(4)}</span>
          </div>
          
          <div class="flex justify-between text-xs text-white/70">
            <span>Converted USD</span>
            <span>$${cUSD.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
          </div>
          
          <div class="flex justify-between text-xs text-white/70">
            <span>Bonus</span>
            <span>${bonus >= 0 ? '+' : ''}$${bonus.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
          </div>
        </div>
        
        <div class="flex justify-between items-center text-xl font-bold border-t border-white/30 pt-3">
          <span>🇺🇸 USD</span>
          <span class="bg-blue-600 px-4 py-2 rounded text-2xl">$${pUSD.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
        </div>
      </div>
    </div>
  `;

  document.getElementById("result").innerHTML = resultHTML;
}

// Fetch rates and calculate on page load
window.onload = function() {
  fetchRates();
};
</script>

</body>
</html>
