<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Word Flashcard App</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
	<style>
		:root {
			--ink: #12213a;
			--muted: #60718e;
			--panel: rgba(255, 255, 255, 0.78);
			--panel-border: rgba(148, 163, 184, 0.25);
		}

		body {
			font-family: "Sora", "Segoe UI", sans-serif;
			background:
				radial-gradient(circle at 10% 20%, #d7f2ff 0%, transparent 36%),
				radial-gradient(circle at 88% 12%, #ffe7c8 0%, transparent 33%),
				linear-gradient(140deg, #edf2f7 0%, #dfe8f3 45%, #d9e4f0 100%);
			color: var(--ink);
		}

		.hero {
			background: linear-gradient(125deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.62));
			border: 1px solid var(--panel-border);
			backdrop-filter: blur(8px);
			box-shadow: 0 24px 48px -32px rgba(19, 36, 67, 0.5);
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--panel-border);
			backdrop-filter: blur(7px);
			box-shadow: 0 18px 34px -28px rgba(18, 33, 58, 0.55);
		}

		.home-card {
			position: relative;
			overflow: hidden;
		}

		.home-card::after {
			content: "";
			position: absolute;
			right: -48px;
			top: -48px;
			width: 140px;
			height: 140px;
			border-radius: 999px;
			opacity: 0.18;
			background: linear-gradient(135deg, #0ea5e9, #3b82f6);
		}

		button {
			transition: transform 0.16s ease, box-shadow 0.2s ease, filter 0.2s ease;
		}

		button:hover:not(:disabled) {
			transform: translateY(-1px);
			box-shadow: 0 14px 22px -16px rgba(30, 64, 175, 0.55);
			filter: saturate(1.07);
		}

		.screen-enter {
			animation: liftIn 0.45s ease both;
		}

		@keyframes liftIn {
			from {
				opacity: 0;
				transform: translateY(12px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.flashcard-wrap {
			perspective: 1200px;
		}

		.flashcard-inner {
			position: relative;
			width: 100%;
			height: 100%;
			transform-style: preserve-3d;
			transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
			will-change: transform;
		}

		.flashcard-inner.flipped {
			transform: rotateY(180deg);
		}

		.flashcard-face {
			position: absolute;
			inset: 0;
			backface-visibility: hidden;
		}

		.flashcard-back {
			transform: rotateY(180deg);
		}

		.card-content {
			transition:
				opacity 0.22s ease,
				transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
				filter 0.22s ease;
			will-change: opacity, transform;
		}

		.card-content--hidden {
			opacity: 0;
			transform: translateY(6px) scale(0.985);
			filter: blur(1px);
		}
	</style>
</head>
<body class="min-h-screen text-slate-900">
	<div id="app" class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">
		<header class="hero mb-8 rounded-3xl p-6 sm:p-8">
			<h1 class="text-2xl font-bold tracking-tight sm:text-3xl">Word Flashcard</h1>
			<p class="mt-2 text-sm text-slate-600 sm:text-base">
				Learn in groups of 10 words, then pass the quiz to complete a group.
			</p>
		</header>

		<main>
			<div v-if="loadError" class="rounded-2xl bg-rose-50 p-6 text-rose-700 shadow-sm">{{ loadError }}</div>
			<div v-else-if="sourceWords.length === 0" class="rounded-2xl bg-white p-6 text-slate-500 shadow-sm">Loading word list…</div>
			<template v-else>
			<section v-if="screen === 'home'" class="screen-enter space-y-6">
				<div class="grid gap-4 md:grid-cols-3">
					<div class="panel home-card flex h-full flex-col rounded-3xl p-6">
						<h2 class="text-lg font-semibold">Learn</h2>
						<div class="mt-2 min-h-[5.5rem] space-y-1">
							<p class="text-sm text-slate-600">
								Next group: <span class="font-semibold text-slate-800">{{ nextLearnGroupLabel }}</span>
							</p>
							<p class="text-sm text-slate-500">{{ learnedCount }} / {{ groups.length }} groups completed at least once</p>
						</div>
						<button
							class="mt-auto w-full rounded-lg bg-sky-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-sky-500 disabled:cursor-not-allowed disabled:bg-slate-300"
							:disabled="!nextLearnGroup"
							@click="startLearn"
						>
							Start Learning
						</button>
					</div>

					<div class="panel home-card flex h-full flex-col rounded-3xl p-6">
						<h2 class="text-lg font-semibold">Revisit</h2>
						<div class="mt-2 min-h-[5.5rem] space-y-1">
							<p class="text-sm text-slate-600">
								Next due: <span class="font-semibold text-slate-800">{{ nextRevisitGroupLabel }}</span>
							</p>
							<p class="text-sm text-slate-500">{{ dueRevisitCount }} groups waiting for revisit</p>
						</div>
						<button
							class="mt-auto w-full rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-emerald-500 disabled:cursor-not-allowed disabled:bg-slate-300"
							:disabled="!nextRevisitGroup"
							@click="startRevisit"
						>
							Start Revisit
						</button>
					</div>

					<div class="panel home-card flex h-full flex-col rounded-3xl p-6">
						<h2 class="text-lg font-semibold">Quiz</h2>
						<div class="mt-2 min-h-[5.5rem] space-y-1">
							<p class="text-sm text-slate-600">
								From learned words: <span class="font-semibold text-slate-800">{{ learnedWordCount }}</span>
							</p>
							<p class="text-sm text-slate-500">Pick random 20 words for a mixed quiz</p>
						</div>
						<button
							class="mt-auto w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500 disabled:cursor-not-allowed disabled:bg-slate-300"
							:disabled="learnedWordCount < 20"
							@click="startMixedQuiz"
						>
							Start Mixed Quiz (20)
						</button>
					</div>
				</div>

				<div class="panel rounded-3xl p-6">
					<h3 class="text-base font-semibold">Group Progress</h3>
					<div class="mt-4 space-y-3 md:hidden">
						<div v-for="group in groups" :key="`mobile-${group.id}`" class="rounded-2xl border border-slate-200/80 bg-white/70 p-4">
							<div class="flex items-start justify-between gap-3">
								<p class="font-semibold text-slate-800">{{ group.label }}</p>
								<span class="rounded-full px-2 py-0.5 text-xs" :class="stageInfo(group).badgeClass">{{ stageInfo(group).label }}</span>
							</div>
							<p class="mt-1 text-xs text-slate-500">{{ stageInfo(group).detail }}</p>
							<div class="mt-3 space-y-1 text-xs text-slate-600">
								<p>Learned: <span class="font-medium text-slate-700">{{ formatDate(group.learnedDate) }}</span></p>
								<p>Next revisit: <span class="font-medium text-slate-700">{{ formatDate(group.nextRevisitDate) }}</span></p>
							</div>
							<div class="mt-3 grid w-full gap-0 overflow-hidden rounded-md" :class="group.learnedDate ? 'grid-cols-2' : 'grid-cols-1'">
								<button
									class="w-full rounded-none bg-emerald-600 px-2.5 py-2 text-xs font-semibold text-white hover:bg-emerald-500"
									@click="startGroupPrimary(group)"
								>
									{{ group.learnedDate ? 'Revisit' : 'Learn' }}
								</button>
								<button
									v-if="group.learnedDate"
									class="w-full rounded-none bg-indigo-600 px-2.5 py-2 text-xs font-semibold text-white hover:bg-indigo-500"
									@click="startGroupQuiz(group.id)"
								>
									Quiz
								</button>
							</div>
						</div>
					</div>
					<div class="mt-4 hidden overflow-x-auto md:block">
						<table class="min-w-full text-sm">
							<thead>
								<tr class="border-b text-left text-slate-600">
									<th class="py-2 pr-4">Group</th>
									<th class="py-2 pr-4">Learned Date</th>
									<th class="py-2 pr-4">Next Revisit</th>
									<th class="py-2 pr-4">Status</th>
									<th class="py-2 pr-4">Actions</th>
								</tr>
							</thead>
							<tbody>
								<tr v-for="group in groups" :key="group.id" class="border-b last:border-b-0">
									<td class="py-2 pr-4 font-medium">{{ group.label }}</td>
									<td class="py-2 pr-4">{{ formatDate(group.learnedDate) }}</td>
									<td class="py-2 pr-4">{{ formatDate(group.nextRevisitDate) }}</td>
									<td class="py-2 pr-4">
										<span class="rounded-full px-2 py-0.5 text-xs" :class="stageInfo(group).badgeClass">{{ stageInfo(group).label }}</span>
										<p class="mt-1 text-xs text-slate-500">{{ stageInfo(group).detail }}</p>
									</td>
									<td class="py-2 pr-4">
										<div class="grid w-full gap-0 overflow-hidden rounded-md" :class="group.learnedDate ? 'grid-cols-2' : 'grid-cols-1'">
											<button
												class="w-full rounded-none bg-emerald-600 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-emerald-500"
												@click="startGroupPrimary(group)"
											>
												{{ group.learnedDate ? 'Revisit' : 'Learn' }}
											</button>
											<button
												v-if="group.learnedDate"
												class="w-full rounded-none bg-indigo-600 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-indigo-500"
												@click="startGroupQuiz(group.id)"
											>
												Quiz
											</button>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</section>

			<section v-else-if="screen === 'learn'" class="screen-enter space-y-4">
				<div class="panel rounded-3xl p-5">
					<div class="flex items-center justify-between">
						<p class="text-sm font-semibold text-sky-700">{{ activeGroup.label }} - Learning {{ learnIndex + 1 }} / {{ activeGroup.words.length }}</p>
						<button class="text-sm text-slate-500 hover:text-slate-700" @click="goHome">Exit</button>
					</div>
				</div>

				<div class="panel rounded-3xl p-6">
					<div class="mx-auto w-full max-w-xs">
						<div
							class="flashcard-wrap h-[460px] cursor-pointer select-none"
							@click="toggleLearnFlip"
						>
							<div class="flashcard-inner" :class="{ flipped: isFlipped }">
								<div class="flashcard-face rounded-3xl border border-sky-200 bg-gradient-to-b from-sky-100 to-sky-200 p-6 shadow-lg">
									<div class="card-content flex h-full flex-col items-center justify-center text-center" :class="{ 'card-content--hidden': !cardWordVisible }">
										<p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-700">Word</p>
										<h2 class="mt-5 text-5xl font-bold leading-tight text-sky-900">{{ currentWord.word }}</h2>
										<p class="mt-10 text-xs text-sky-700">Tap card to flip</p>
									</div>
								</div>

								<div class="flashcard-face flashcard-back rounded-3xl border border-indigo-200 bg-gradient-to-b from-indigo-50 to-indigo-100 p-6 shadow-lg">
									<div class="card-content flex h-full flex-col" :class="{ 'card-content--hidden': !cardWordVisible }">
										<div>
											<p class="text-xs font-semibold uppercase tracking-[0.2em] text-indigo-700">Word</p>
											<h3 class="mt-2 text-3xl font-bold text-indigo-950">{{ currentWord.word }}</h3>
											<p
												class="mt-2 cursor-pointer text-lg font-medium text-indigo-700 underline decoration-indigo-300 underline-offset-4"
												@click.stop="speak(currentWord.word)"
											>
												{{ currentWord.pronounce }}
											</p>
										</div>
										<div class="mt-5 grow space-y-2 overflow-y-auto rounded-xl bg-white/70 p-4">
											<p class="text-base font-semibold leading-snug text-indigo-800">{{ currentWord.chinese }}</p>
											<p class="text-sm leading-relaxed text-slate-600">{{ currentWord.english }}</p>
										</div>
										<div class="mt-4 grid gap-2">
											<button
												:disabled="learnTransitioning"
												class="rounded-lg bg-sky-600 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-500 disabled:cursor-not-allowed disabled:bg-slate-300"
												@click.stop="nextLearnWord"
											>
												Next
											</button>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>

			<section v-else-if="screen === 'quiz'" class="screen-enter space-y-4">
				<div class="panel rounded-3xl p-5">
					<div class="flex items-center justify-between">
						<p class="text-sm font-semibold text-emerald-700">
							{{ quizSessionLabel }} - Quiz | Remaining queue: {{ quizQueue.length }} | Passed: {{ quizPassedCount }}
						</p>
						<button class="text-sm text-slate-500 hover:text-slate-700" @click="goHome">Exit</button>
					</div>
				</div>

				<div class="panel rounded-3xl p-6">
					<!-- word-to-meaning: show word, pick meaning -->
					<div v-if="quizType === 'word-to-meaning'" class="text-center">
						<p class="text-xs font-semibold uppercase tracking-widest text-sky-500">Word &rarr; Meaning</p>
						<h2 class="mt-3 text-3xl font-bold">{{ quizWord.word }}</h2>
						<p
							class="mt-2 cursor-pointer text-lg font-medium text-slate-600 underline decoration-slate-300 underline-offset-4"
							@click="speak(quizWord.word)"
						>
							{{ quizWord.pronounce }}
						</p>
					</div>
					<!-- meaning-to-word: show meaning, pick word -->
					<div v-else class="rounded-xl border border-indigo-100 bg-indigo-50/60 p-4 text-left">
						<p class="text-xs font-semibold uppercase tracking-widest text-indigo-500">Meaning &rarr; Word</p>
						<p class="mt-3 text-base font-semibold leading-snug text-indigo-900">{{ quizWord.chinese }}</p>
						<p class="mt-1 text-sm leading-relaxed text-slate-600">{{ quizWord.english }}</p>
					</div>

					<div class="mt-6 grid gap-3">
						<button
							v-for="(option, idx) in quizOptions"
							:key="option.id"
							:disabled="!!quizFeedback"
							class="rounded-lg border px-4 py-3 text-left transition disabled:cursor-not-allowed"
							:class="quizFeedback
								? (option.id === quizFeedback.correctId
									? 'border-emerald-400 bg-emerald-50 text-emerald-800'
									: option.id === quizFeedback.chosenId && !quizFeedback.ok
										? 'border-rose-400 bg-rose-50 text-rose-800'
										: 'border-slate-200 bg-white text-slate-400')
								: 'border-slate-200 bg-white hover:border-slate-400'"
							@click="submitQuiz(option)"
						>
							<template v-if="quizType === 'word-to-meaning'">
								<p class="text-sm font-semibold">{{ option.chinese }}</p>
								<p class="mt-1 text-xs" :class="quizFeedback ? 'text-inherit' : 'text-slate-500'">{{ option.english }}</p>
							</template>
							<template v-else>
								<p class="text-sm font-semibold">{{ option.word }}</p>
								<p v-if="option.pronounce" class="mt-1 text-xs" :class="quizFeedback ? 'text-inherit' : 'text-slate-500'">{{ option.pronounce }}</p>
							</template>
						</button>
					</div>

					<p v-if="quizFeedback" class="mt-4 text-sm font-semibold" :class="quizFeedback.ok ? 'text-emerald-700' : 'text-rose-700'">
						{{ quizFeedback.message }}
					</p>
				</div>
			</section>

			<section v-else-if="screen === 'done'" class="screen-enter panel rounded-3xl p-6">
				<h2 class="text-xl font-bold">Group Completed</h2>
				<p class="mt-2 text-slate-600">
					{{ activeGroup.label }} is done for now. Next revisit date: <span class="font-semibold">{{ formatDate(activeGroup.nextRevisitDate) }}</span>
				</p>
				<button class="mt-5 rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700" @click="goHome">
					Back to Main
				</button>
			</section>
			</template>
		</main>
	</div>

	<script>
		const { createApp } = Vue;

		const SOURCE_WORDS = [
		    {word:'nostalgic',pronounce:'[nɔ\'stældʒik]',chinese:'adj. 乡愁的,怀旧的',english:'adj. the state of being homesick',group:1},
		    {word:'disburse',pronounce:'[dis\'bəә:s]',chinese:'v. 支付',english:'v. to pay out',group:1},
		    {word:'insinuate',pronounce:'[in\'sinjueit]',chinese:'v. 暗示；含沙射影地 说',english:'v. to introduce (oneself) by subtle and artful means.',group:1},
		    {word:'swell',pronounce:'[swel]',chinese:'n. / v. 膨胀 adj.时髦 的，很棒的',english:'n. expand; v. to increase in size or volume',group:1},
		    {word:'valiant',pronounce:'[\'væljəәnt]',chinese:'adj. 英勇的n. 勇士',english:'adj. possessing valor; n. brave',group:1},
		    {word:'espy',pronounce:'[is\'pai]',chinese:'v. (从远处等)突然看 到；窥见',english:'v. to catch sight of (something distant, partially hidden, or obscure)',group:1},
		    {word:'encircle',pronounce:'[in\'səә:kl]',chinese:'v. 环绕；包围',english:'v. to form a circle around; surround',group:1},
		    {word:'tolerate',pronounce:'[\'tɔləәreit]',chinese:'v. 忍受,容许,宽恕',english:'v. to allow without prohibiting or opposing; permit.',group:1},
		    {word:'discord',pronounce:'[\'diskɔ:d]',chinese:'n. 不调和',english:'n. lack of agreement',group:1},
		    {word:'sequel',pronounce:'[\'si:kwəәl]',chinese:'n. 结局,后果,续集',english:'n. something that follows;',group:1},
		    {word:'ooze',pronounce:'[u:z]',chinese:'v. 渗透；渗出',english:'v. to flow or leak out slowly, as through small openings',group:2},
		    {word:'mire',pronounce:'[\'maiəә]',chinese:'n. 泥沼v. 使. . . 陷 于泥泞',english:'n. an area of wet; v. to cause to sink or become stuck in',group:2},
		    {word:'facile',pronounce:'[\'fæsail]',chinese:'adj. 容易的,灵巧的',english:'adj. done or achieved with little effort or difficulty',group:2},
		    {word:'inhumane',pronounce:'[,inhju(:)\'mein]',chinese:'adj. 无人情味的,残忍 的',english:'adj. lacking pity or compassion.',group:2},
		    {word:'blubber',pronounce:'[\'blʌbəә]',chinese:'n. 鲸 脂 ； n/v 哭 诉 adj. 肿大的',english:'n. to cry noisily;adj. expanded;n. a loud crying',group:2},
		    {word:'cardiology',pronounce:'[,kɑ:di\'ɔləәdʒi]',chinese:'n. 心脏学',english:'n. the medical study of the heart',group:2},
		    {word:'bale',pronounce:'[beil]',chinese:'n. 包，捆；不幸，灾 祸',english:'n. a large package ;mental suffering',group:2},
		    {word:'subtract',pronounce:'[səәb\'trækt]',chinese:'v. 减去；扣掉',english:'v. to take away; deduct',group:2},
		    {word:'fulsome',pronounce:'[\'fulsəәm]',chinese:'adj. 过度的,令人生厌 的',english:'adj. offensively flattering or insincere',group:2},
		    {word:'stock',pronounce:'[stɔk]',chinese:'n. 股票; 库存;家畜 v. 供给',english:'n. a supply accumulated for future use; adj. store;v. to gather and lay in a supply of something',group:2},
		    {word:'treasury',pronounce:'［treʒ(əә)rɪ］',chinese:'n. 财政部 ,宝库',english:'n. a place in which treasure is kept',group:3},
		    {word:'bisect',pronounce:'[bai\'sekt]',chinese:'v. 平分,二等分',english:'v. to cut or divide into two parts',group:3},
		    {word:'farce',pronounce:'[fɑ:s]',chinese:'n. 闹剧,胡闹',english:'n. a ludicrous show',group:3},
		    {word:'cylinder',pronounce:'[\'silindəә]',chinese:'n. 汽缸；圆筒',english:'n. a cylindrical container or object.',group:3},
		    {word:'forage',pronounce:'[\'fɔridʒ]',chinese:'n. 粮草v. 收集（粮 草）',english:'n. food for domestic animals;v. to collect forage from',group:3},
		    {word:'roast',pronounce:'[rəәust]',chinese:'n./v. 烤(肉) adj. 烤 过的',english:'n./v. to cook with dry heat; n. something roasted; adj. roasted',group:3},
		    {word:'lateral',pronounce:'[\'lætəәrəәl]',chinese:'adj. 侧面的,旁边的',english:'adj. Of, relating to, or situated at or on the side',group:3},

		const REVIEW_INTERVALS = [1, 2, 4, 7, 10, 14];

		function isoToday() {
			return new Date().toISOString().slice(0, 10);
		}

		function addDays(dateStr, days) {
			const dt = new Date(dateStr + "T00:00:00");
			dt.setDate(dt.getDate() + days);
			return dt.toISOString().slice(0, 10);
		}

		function shuffle(array) {
			const out = [...array];
			for (let i = out.length - 1; i > 0; i -= 1) {
				const j = Math.floor(Math.random() * (i + 1));
				[out[i], out[j]] = [out[j], out[i]];
			}
			return out;
		}

		function getDefaultGroups(SOURCE_WORDS) {
			// Group words by the PDF list number
			const map = new Map();
			for (const w of SOURCE_WORDS) {
				if (!map.has(w.group)) map.set(w.group, []);
				map.get(w.group).push(w);
			}
			return [...map.entries()]
				.sort((a, b) => a[0] - b[0])
				.map(([gid, words]) => ({
					id: gid,
					label: `List ${gid}`,
					words,
					learnedDate: null,
					nextRevisitDate: null,
					level: 0
				}));
		}

		createApp({
			data() {

			computed: {
				activeGroup() {
					return this.groups.find((g) => g.id === this.activeGroupId) || null;
				},
				currentWord() {
					if (!this.activeGroup) return null;

				},
				quizWord() {
					if (!this.quizWords.length || this.quizCurrentIndex === null) return null;

					return this.groups.find((g) => !g.learnedDate) || null;

					return this.groups.find((g) => this.isDue(g)) || null;

					return this.nextLearnGroup ? this.nextLearnGroup.label : "All groups learned";

			methods: {
				wordKey(word) {
					return `${word.group}::${word.word}::${word.pronounce}`;
				},
				wrongWordWeight(word) {
					const record = this.wrongWords[this.wordKey(word)];
					if (!record) return 1;
					const failBoost = Math.min(8, (record.failCount || 0) * 2);
					const recoveryBoost = Math.max(0, 3 - (record.correctCount || 0));
					return 1 + failBoost + recoveryBoost;
				},
				pickWeightedWords(words, count) {
					const pool = [...words];
					const selected = [];
					while (pool.length > 0 && selected.length < count) {
						let total = 0;
						for (const w of pool) total += this.wrongWordWeight(w);
						let roll = Math.random() * total;
						let chosenIdx = 0;
						for (let i = 0; i < pool.length; i += 1) {
							roll -= this.wrongWordWeight(pool[i]);
							if (roll <= 0) {
								chosenIdx = i;
								break;
							}
						}
						selected.push(pool[chosenIdx]);
						pool.splice(chosenIdx, 1);
					}
					return selected;
				},
				markWrongWord(word) {
					const key = this.wordKey(word);
					const prev = this.wrongWords[key] || { failCount: 0, correctCount: 0 };
					this.wrongWords[key] = {
						failCount: prev.failCount + 1,
						correctCount: 0
					};
				},
				markCorrectWord(word) {
					const key = this.wordKey(word);
					const prev = this.wrongWords[key];
					if (!prev) return;
					const nextCorrect = (prev.correctCount || 0) + 1;
					if (nextCorrect >= 3) {
						delete this.wrongWords[key];
						return;
					}
					this.wrongWords[key] = {
						failCount: prev.failCount || 1,
						correctCount: nextCorrect
					};
				},
				loadProgress() {
					const defaults = getDefaultGroups(this.sourceWords);
					try {
						const raw = localStorage.getItem(STORAGE_KEY);
						if (!raw) {
							this.groups = defaults;
							this.wrongWords = {};
							return;
						}
						const parsed = JSON.parse(raw);
						const savedGroups = Array.isArray(parsed) ? parsed : (parsed.groups || []);
						this.wrongWords = Array.isArray(parsed) ? {} : (parsed.wrongWords || {});
						this.groups = defaults.map((group) => {
							const saved = savedGroups.find((g) => g.id === group.id);
							if (!saved) return group;
							return {
								...group,
								learnedDate: saved.learnedDate || null,
								nextRevisitDate: saved.nextRevisitDate || null,
								level: Number.isInteger(saved.level) ? saved.level : 0
							};
						});
					} catch (err) {
						console.error("Failed to load progress", err);
						this.groups = defaults;
					}
				},
				saveProgress() {
					const payload = {
						groups: this.groups.map((g) => ({
							id: g.id,
							learnedDate: g.learnedDate,
							nextRevisitDate: g.nextRevisitDate,
							level: g.level
						})),
						wrongWords: this.wrongWords
					};

				},
				formatDate(dateStr) {
					if (!dateStr) return "-";
					const dt = new Date(dateStr + "T00:00:00");
					return dt.toLocaleDateString();

				daysUntil(dateStr) {
					if (!dateStr) return null;
					const today = new Date(isoToday() + "T00:00:00");

					if (!group.learnedDate) {

							badgeClass: "bg-slate-100 text-slate-700"
						};

					const days = this.daysUntil(group.nextRevisitDate);
					if (days <= 0) {
						return {
							label: "Due now",
							detail: "Revisit today",
							badgeClass: "bg-amber-100 text-amber-700"

						// Don't speak the word — it's what the user has to identify
					}
					this.quizFeedback = null;
				},
				submitQuiz(chosen) {
					if (!this.quizWord || this.quizFeedback) return;
					// Keep current word stable while showing feedback.
					const correctWord = this.quizWord;
					const currentIndex = this.quizCurrentIndex;
					const isCorrect = chosen.id === currentIndex;
					if (isCorrect) {
						this.markCorrectWord(correctWord);
					} else {
						this.markWrongWord(correctWord);
					}
					const wrongMsg = this.quizType === 'word-to-meaning'
						? `Wrong — correct meaning: ${correctWord.chinese}`
						: `Wrong — correct word: ${correctWord.word} ${correctWord.pronounce}`;
					this.quizFeedback = isCorrect
						? { ok: true, chosenId: chosen.id, correctId: currentIndex, message: 'Correct!' }
						: { ok: false, chosenId: chosen.id, correctId: currentIndex, message: wrongMsg };

					setTimeout(() => {
						if (this.quizQueue[0] === currentIndex) {
							this.quizQueue.shift();
						}
						if (isCorrect) {
							this.quizPassed.push(currentIndex);
						} else {
							this.quizQueue.push(currentIndex);
						}
						this.saveProgress();
						this.prepareQuizQuestion();
					}, 1200);
				},
				finishGroup() {
					if (this.activeMode === "mixed-quiz") {
						this.goHome();
						return;
					}
					if (!this.activeGroup) return;
					const isManualSession = this.activeMode === "manual-revisit" || this.activeMode === "manual-quiz";
					if (isManualSession) {
						this.screen = "done";
						return;
					}

					const today = isoToday();
					if (!this.activeGroup.learnedDate) {
						this.activeGroup.learnedDate = today;
					}

					const nextLevel = Math.min(this.activeGroup.level + 1, REVIEW_INTERVALS.length - 1);
					this.activeGroup.level = nextLevel;
					this.activeGroup.nextRevisitDate = addDays(today, REVIEW_INTERVALS[nextLevel]);

					this.saveProgress();
					this.screen = "done";
				},
				resetAll() {
					this.groups = getDefaultGroups(this.sourceWords);
					this.saveProgress();
					this.goHome();
				}
			},
			mounted() {
				this.sourceWords = SOURCE_WORDS;
				this.loadProgress();
			}
		}).mount("#app");
	</script>
</body>
