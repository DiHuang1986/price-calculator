<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>价格计算器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&display=swap');

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in { animation: slideIn 0.5s ease-out; }
    #result:empty { display: none; }

    @media (min-width: 640px) {
      .bg-gray-50 div[class*="sm:flex-row"][class*="sm:justify-between"][class*="sm:items-center"] {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 15rem);
        align-items: center;
        column-gap: 0.5rem;
      }
    }

    .bg-gray-50 div[class*="sm:flex-row"][class*="sm:justify-between"][class*="sm:items-center"] > label {
      min-width: 0;
    }

    .bg-gray-50 div[class*="sm:w-60"] {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    @media (min-width: 640px) {
      .bg-gray-50 div[class*="sm:w-60"] {
        max-width: 15rem;
      }
    }

    .bg-gray-50 div[class*="sm:w-60"] input {
      min-width: 0;
      width: 100%;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-2.5 pt-5 flex justify-center items-start sm:p-4 sm:items-center">

<div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-xl animate-slide-in border border-gray-200">
  <h2 class="text-gray-800 text-center mb-4 text-2xl font-bold">💰 价格计算器</h2>

  <div class="bg-gray-50 p-4 rounded-lg mb-3 border border-gray-200">
    <div class="flex justify-between items-center mb-3">
      <div class="text-gray-700 font-semibold text-sm">汇率设置</div>
      <button onclick="fetchRates()" id="fetchBtn" class="px-3 py-1 bg-gray-800 hover:bg-gray-900 text-white text-xs font-semibold rounded-md transition-all shadow-sm hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
        🔄 获取实时汇率
      </button>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">加拿大汇率</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold whitespace-nowrap">1 USD =</span>
        <input id="cadRate" value="1.3667" oninput="convertCAD()" class="flex-1 px-3 border-2 border-gray-300 text-sm transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">CAD</span>
      </div>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">人民币汇率</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold whitespace-nowrap">1 USD =</span>
        <input id="cnyRate" value="7.24" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">CNY</span>
      </div>
    </div>
  </div>

  <div class="bg-gray-50 p-4 rounded-lg mb-3 border border-gray-200">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">加币成本</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold">CAD</span>
        <input id="cad" value="199" oninput="convertCAD()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-r-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
      </div>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">折算美元</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold">USD</span>
        <input id="usd" value="145.668" oninput="convertUSD()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-r-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
      </div>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">采购佣金</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <input id="buyRate" value="2" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-l-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">%</span>
      </div>
    </div>
  </div>

  <div class="bg-gray-50 p-4 rounded-lg mb-3 border border-gray-200">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">国际运费</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold">¥</span>
        <input id="ship" value="25" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-r-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
      </div>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">保税仓费用</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-r-0 rounded-l-md text-gray-700 text-xs font-semibold">¥</span>
        <input id="bond" value="15" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-r-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
      </div>
    </div>
  </div>

  <div class="bg-gray-50 p-4 rounded-lg mb-3 border border-gray-200">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">平台抽佣</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <input id="platform" value="6" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-l-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">%</span>
      </div>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">带货佣金</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <input id="live" value="1" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-l-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">%</span>
      </div>
    </div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">毛利</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <input id="profit" value="5" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-l-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">%</span>
      </div>
    </div>
  </div>

  <div class="bg-gray-50 p-4 rounded-lg mb-3 border border-gray-200">
    <div class="text-gray-700 font-semibold text-sm mb-3">税费设置</div>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2.5 last:mb-0">
      <label class="text-gray-800 font-medium text-sm sm:flex-1">税金</label>
      <div class="flex items-stretch h-9 w-full sm:w-60">
        <input id="tax" value="9.11" oninput="calc()" class="flex-1 px-3 border-2 border-gray-300 text-sm rounded-l-md transition-all focus:outline-none focus:border-gray-800 focus:ring-2 focus:ring-gray-200 hover:border-gray-400">
        <span class="flex items-center px-2.5 bg-gray-200 border-2 border-gray-300 border-l-0 rounded-r-md text-gray-700 text-xs font-semibold">%</span>
      </div>
    </div>
  </div>

  <div id="result" class="mt-4 min-h-[50px]"></div>
</div>

<script>
// 页面加载时自动获取汇率并计算
window.onload = function() {
  fetchRates();
};

// 获取实时汇率
async function fetchRates() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ 获取中...';
  
  try {
    // 使用免费的汇率API
    const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await response.json();
    
    if (data.rates) {
      // 更新CAD汇率
      if (data.rates.CAD) {
        document.getElementById('cadRate').value = data.rates.CAD.toFixed(4);
      }
      
      // 更新CNY汇率
      if (data.rates.CNY) {
        document.getElementById('cnyRate').value = data.rates.CNY.toFixed(4);
      }
      
      // 更新计算
      convertCAD();
      
      btn.innerHTML = '✅ 更新成功';
      setTimeout(() => {
        btn.innerHTML = '🔄 获取实时汇率';
        btn.disabled = false;
      }, 2000);
    }
  } catch (error) {
    console.error('获取汇率失败:', error);
    btn.innerHTML = '❌ 获取失败';
    setTimeout(() => {
      btn.innerHTML = '🔄 获取实时汇率';
      btn.disabled = false;
    }, 2000);
  }
}

function convertCAD() {
  const cad = Number(document.getElementById("cad").value);
  const cadRate = Number(document.getElementById("cadRate").value);
  const usd = cad / cadRate;
  document.getElementById("usd").value = usd.toFixed(3);
  calc();
}

function convertUSD() {
  const usd = Number(document.getElementById("usd").value);
  const cadRate = Number(document.getElementById("cadRate").value);
  const cad = usd * cadRate;
  document.getElementById("cad").value = cad.toFixed(2);
  calc();
}

function calc() {
  const usd = Number(document.getElementById("usd").value);
  const buyRate = Number(document.getElementById("buyRate").value) / 100;

  const shipCNY = Number(document.getElementById("ship").value);
  const bondCNY = Number(document.getElementById("bond").value);

  const platform = Number(document.getElementById("platform").value) / 100;
  const tax = Number(document.getElementById("tax").value) / 100;
  const live = Number(document.getElementById("live").value) / 100;
  const profit = Number(document.getElementById("profit").value) / 100;

  const cnyRate = Number(document.getElementById("cnyRate").value);

  // 1️⃣ 进货成本
  const baseCostCNY = usd * cnyRate;  // 基础成本
  const buyCommissionCNY = usd * buyRate * cnyRate;  // 采购佣金
  const cost = usd * (1 + buyRate);
  const costCNY = cost * cnyRate;

  // 运费和仓储费用（转换为美元用于计算）
  const ship = shipCNY / cnyRate;
  const bond = bondCNY / cnyRate;

  // 2️⃣ 其他费率按含税最终售价计算，先反推含税最终售价
  const baseRate = platform + live + profit;
  const taxRateOnFinal = tax / (1 + tax); // 税金按税前基数计提，折算为最终售价占比
  const finalRate = baseRate + taxRateOnFinal;
  const price = (cost + ship + bond) / (1 - finalRate);
  const basePrice = price / (1 + tax);
  const priceInCNY = price * cnyRate;

  // 其他费率费用（按含税最终售价）
  const platformFee = price * platform * cnyRate;
  const liveFee = price * live * cnyRate;
  const profitAmount = price * profit * cnyRate;

  // 税金（独立计算）
  const taxFee = basePrice * tax * cnyRate;
  const otherFeesTotal = platformFee + liveFee + profitAmount;
  
  // 计算总成本
  const totalCost = costCNY + shipCNY + bondCNY + otherFeesTotal + taxFee;

  const formatCNY = (amount) => "¥" + amount.toLocaleString('zh-CN', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });

  document.getElementById("result").innerHTML =
    "<div class='rounded-xl border border-gray-200 bg-white shadow-sm p-4 sm:p-5 text-gray-800'>" +
    "<div class='flex items-end justify-between border-b border-gray-200 pb-3 mb-3'>" +
    "<div>" +
    "<div class='text-xs text-gray-500 tracking-wide'>报价结果</div>" +
    "<div class='text-sm font-semibold text-gray-800'>成本与费用明细</div>" +
    "</div>" +
    "<div class='text-right'>" +
    "<div class='text-xs text-gray-500'>最终售价</div>" +
    "<div class='text-2xl font-bold text-gray-900'>" + formatCNY(priceInCNY) + "</div>" +
    "</div>" +
    "</div>" +
    "<div class='space-y-3 text-sm'>" +
    "<div class='space-y-1.5'>" +
    "<div class='text-xs font-semibold text-gray-500'>成本项</div>" +
    "<div class='flex justify-between text-gray-700'><span>进货成本</span><span class='font-semibold'>" + formatCNY(baseCostCNY) + "</span></div>" +
    "<div class='flex justify-between text-gray-700'><span>采购佣金</span><span class='font-semibold'>" + formatCNY(buyCommissionCNY) + "</span></div>" +
    "<div class='flex justify-between text-gray-700'><span>国际运费</span><span class='font-semibold'>" + formatCNY(shipCNY) + "</span></div>" +
    "<div class='flex justify-between text-gray-700'><span>保税仓费</span><span class='font-semibold'>" + formatCNY(bondCNY) + "</span></div>" +
    "</div>" +
    "<div class='space-y-1.5 pt-2 border-t border-gray-100'>" +
    "<div class='text-xs font-semibold text-gray-500'>其他费率项（按含税最终售价）</div>" +
    "<div class='flex justify-between text-gray-700'><span>平台抽佣</span><span class='font-semibold'>" + formatCNY(platformFee) + "</span></div>" +
    "<div class='flex justify-between text-gray-700'><span>带货佣金</span><span class='font-semibold'>" + formatCNY(liveFee) + "</span></div>" +
    "<div class='flex justify-between text-gray-700'><span>毛利</span><span class='font-semibold'>" + formatCNY(profitAmount) + "</span></div>" +
    "<div class='flex justify-between text-gray-800'><span>其他费用小计</span><span class='font-semibold'>" + formatCNY(otherFeesTotal) + "</span></div>" +
    "</div>" +
    "<div class='space-y-1.5 pt-2 border-t border-gray-200'>" +
    "<div class='text-xs font-semibold text-gray-500'>税费（单独）</div>" +
    "<div class='flex justify-between text-gray-800'><span>税金</span><span class='font-semibold'>" + formatCNY(taxFee) + "</span></div>" +
    "</div>" +
    "<div class='pt-3 border-t border-gray-200 space-y-1.5'>" +
    "<div class='flex justify-between text-gray-800'><span>总成本</span><span class='font-semibold'>" + formatCNY(totalCost) + "</span></div>" +
    "<div class='flex justify-between text-base font-bold text-gray-900'><span>建议售价</span><span>" + formatCNY(priceInCNY) + "</span></div>" +
    "</div>" +
    "</div>" +
    "</div>";
}
</script>

</body>
</html>
